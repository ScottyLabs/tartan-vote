[project]
name = "tartan-vote"
revision = "1.0"
# Extend configurations from subdirectories
# extends = [ "subdir1", "subdir2" ]

# Only genuine secrets live here. Host-specific URLs (APP_BASE_URL,
# FRONTEND_BASE_URL, CORS_ALLOWED_ORIGINS, etc.) are derived from DEV_HOST in
# devenv.nix, and non-secret constants (OIDC_ISSUER, provider IDs, ports) are
# set there too. This keeps the shared profile free of per-developer values.
[profiles.default]
OIDC_CLIENT_ID = { description = "OIDC client ID for the Keycloak client", required = true }
OIDC_CLIENT_SECRET = { description = "OIDC client secret for the Keycloak client", required = true }
BETTER_AUTH_SECRET = { description = "Better Auth signing secret (openssl rand -base64 32)", required = true }

[profiles.dev]
# Development profile inherits all secrets from default profile
# Only define secrets here that need different values or settings than default
# DATABASE_URL = { default = "sqlite:///dev.db" }
#
# New secrets
# REDIS_URL = { description = "Redis connection URL for caching", required = false, default = "redis://localhost:6379" }
