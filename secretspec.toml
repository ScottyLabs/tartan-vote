[project]
name = "tartan-vote"
revision = "1.0"

# Dev-only secrets inherit from default. Host-specific URLs for local development
# are derived from DEV_HOST in devenv.nix enterShell.
[profiles.default]
OIDC_CLIENT_ID = { description = "OIDC client ID for the Keycloak client", required = true }
OIDC_CLIENT_SECRET = { description = "OIDC client secret for the Keycloak client", required = true }
KEYCLOAK_URL = { description = "Keycloak base URL" }
KEYCLOAK_REALM = { description = "Keycloak realm" }
OAUTH_RELAY_URL = { description = "OAuth relay callback URL" }
PROJECT_GROUP = { description = "Keycloak project group path" }
PROJECT_ADMIN_GROUP = { description = "Keycloak project admin group path" }

[profiles.dev]

[profiles.prod]
COOKIE_DOMAIN = { description = "Shared cookie domain", default = ".tartan-vote.scottylabs.org" }
APP_BASE_URL = { description = "Public app URL (API + frontend)", default = "https://tartan-vote.scottylabs.org" }
FRONTEND_BASE_URL = { description = "Public frontend URL (same origin as API)", default = "https://tartan-vote.scottylabs.org" }
CORS_ALLOWED_ORIGINS = { description = "Comma-separated allowed CORS origins", default = "https://tartan-vote.scottylabs.org,https://tartan-vote-api-main.scottylabs.net" }
SENTRY_DSN = { description = "Sentry project DSN" }

[profiles.staging]
APP_BASE_URL = { description = "Staging app URL (API + frontend)", default = "https://tartan-vote-api-staging.scottylabs.net" }
FRONTEND_BASE_URL = { description = "Staging frontend URL (same origin as API)", default = "https://tartan-vote-api-staging.scottylabs.net" }
CORS_ALLOWED_ORIGINS = { description = "Comma-separated allowed CORS origins", default = "https://tartan-vote-api-staging.scottylabs.net" }

[profiles.preview]
APP_BASE_URL = { description = "Preview app URL (API + frontend)", default = "https://tartan-vote-api-staging.scottylabs.net" }
FRONTEND_BASE_URL = { description = "Preview frontend URL (same origin as API)", default = "https://tartan-vote-api-staging.scottylabs.net" }
CORS_ALLOWED_ORIGINS = { description = "Comma-separated allowed CORS origins", default = "https://tartan-vote-api-staging.scottylabs.net" }
