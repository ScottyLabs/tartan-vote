[project]
name = "tartan-vote"
revision = "1.0"

# Dev-only secrets inherit from default. Host-specific URLs for local development
# are derived from DEV_HOST in devenv.nix enterShell.
[profiles.default]
OIDC_CLIENT_ID = { description = "OIDC client ID for the Keycloak client", required = true }
OIDC_CLIENT_SECRET = { description = "OIDC client secret for the Keycloak client", required = true }
BETTER_AUTH_SECRET = { description = "Better Auth signing secret (openssl rand -base64 32)", required = true }

[profiles.dev]

[profiles.prod]
OIDC_ISSUER = { description = "Keycloak OIDC issuer URL", default = "https://idp.scottylabs.org/realms/scottylabs" }
APP_BASE_URL = { description = "Public API base URL", default = "https://api.tartan-vote.scottylabs.org" }
FRONTEND_BASE_URL = { description = "Public frontend URL", default = "https://tartan-vote.scottylabs.org" }
BETTER_AUTH_URL = { description = "Better Auth service root URL", default = "https://auth.tartan-vote.scottylabs.org" }
BETTER_AUTH_BASE_URL = { description = "Better Auth API base URL", default = "https://auth.tartan-vote.scottylabs.org/api/auth" }
CORS_ALLOWED_ORIGINS = { description = "Comma-separated allowed CORS origins", default = "https://tartan-vote.scottylabs.org,https://api.tartan-vote.scottylabs.org,https://auth.tartan-vote.scottylabs.org,https://tartan-vote-frontend-main.scottylabs.net,https://tartan-vote-api-main.scottylabs.net,https://tartan-vote-auth-main.scottylabs.net" }
OIDC_CLIENT_ID = { description = "Keycloak OIDC client ID (written by kennel on deploy)", required = true }
OIDC_CLIENT_SECRET = { description = "Keycloak OIDC client secret (written by kennel on deploy)", required = true }
BETTER_AUTH_SECRET = { description = "Better Auth signing secret", required = true }

[profiles.staging]
OIDC_ISSUER = { description = "Keycloak OIDC issuer URL", default = "https://idp.scottylabs.org/realms/scottylabs" }
APP_BASE_URL = { description = "Staging API base URL", default = "https://tartan-vote-api-staging.scottylabs.net" }
FRONTEND_BASE_URL = { description = "Staging frontend URL", default = "https://tartan-vote-frontend-staging.scottylabs.net" }
BETTER_AUTH_URL = { description = "Staging Better Auth service root URL", default = "https://tartan-vote-auth-staging.scottylabs.net" }
BETTER_AUTH_BASE_URL = { description = "Staging Better Auth API base URL", default = "https://tartan-vote-auth-staging.scottylabs.net/api/auth" }
CORS_ALLOWED_ORIGINS = { description = "Comma-separated allowed CORS origins", default = "https://tartan-vote-frontend-staging.scottylabs.net,https://tartan-vote-api-staging.scottylabs.net,https://tartan-vote-auth-staging.scottylabs.net" }
OIDC_CLIENT_ID = { description = "Keycloak OIDC client ID (written by kennel on deploy)", required = true }
OIDC_CLIENT_SECRET = { description = "Keycloak OIDC client secret (written by kennel on deploy)", required = true }
BETTER_AUTH_SECRET = { description = "Better Auth signing secret", required = true }

[profiles.preview]
OIDC_ISSUER = { description = "Keycloak OIDC issuer URL", default = "https://idp.scottylabs.org/realms/scottylabs" }
APP_BASE_URL = { description = "Preview API base URL (per-PR host; override in OpenBao if needed)", default = "https://tartan-vote-api-staging.scottylabs.net" }
FRONTEND_BASE_URL = { description = "Preview frontend URL", default = "https://tartan-vote-frontend-staging.scottylabs.net" }
BETTER_AUTH_URL = { description = "Preview Better Auth service root URL", default = "https://tartan-vote-auth-staging.scottylabs.net" }
BETTER_AUTH_BASE_URL = { description = "Preview Better Auth API base URL", default = "https://tartan-vote-auth-staging.scottylabs.net/api/auth" }
CORS_ALLOWED_ORIGINS = { description = "Comma-separated allowed CORS origins", default = "https://tartan-vote-frontend-staging.scottylabs.net,https://tartan-vote-api-staging.scottylabs.net,https://tartan-vote-auth-staging.scottylabs.net" }
OIDC_CLIENT_ID = { description = "Keycloak OIDC client ID (written by kennel on deploy)", required = true }
OIDC_CLIENT_SECRET = { description = "Keycloak OIDC client secret (written by kennel on deploy)", required = true }
BETTER_AUTH_SECRET = { description = "Better Auth signing secret", required = true }
